name: Daily Commit

on:
  schedule:
    - cron: "55 5 * * *"
  workflow_dispatch:

permissions:
  contents: write   # <-- REQUIRED

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Git
        run: |
          git config user.name "github-actions"
          git config user.email "23f2001025@ds.study.iitm.ac.in"

      - name: Step with email 23f2001025@ds.study.iitm.ac.in
        run: echo "Running scheduled commit job"

      - name: Create daily commit
        run: |
          echo "Last run: $(date -u)" >> daily-log.txt
          git add daily-log.txt
          git commit -m "Automated daily commit - $(date -u)" || echo "No changes to commit"
          git push
